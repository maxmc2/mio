<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll – Mark It Off</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" href="favicon-512.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; font-size: 14px; display: flex; flex-direction: column; }

  .top-bar { background: #1e2a4a; border-bottom: 2px solid #2d3d6b; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .top-bar-left { display: flex; align-items: center; gap: 16px; }
  .top-bar-title { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: 0.03em; }
  .back-btn { font-size: 12px; color: #8fa3cc; text-decoration: none; padding: 4px 10px; border: 1px solid #3a4f7a; border-radius: 6px; transition: all 0.15s; }
  .back-btn:hover { color: #fff; border-color: #6fa3f5; }
  .top-bar-right { display: flex; align-items: center; gap: 10px; }
  .top-bar-saved { font-size: 11px; color: #7a8fb5; }
  .topbar-btn { font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 20px; cursor: pointer; border: none; font-family: inherit; background: rgba(255,255,255,0.12); color: #fff; transition: opacity 0.15s; }
  .topbar-btn:hover { opacity: 0.85; }
  .topbar-btn.synced  { background: #1a3a1a; color: #6fcf6f; }
  .topbar-btn.syncing { background: #1a2a3a; color: #7ab8f5; }
  .topbar-btn.error   { background: #3a1a1a; color: #f07070; }

  /* TABS */
  .tab-bar { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .tab-left { display: flex; gap: 8px; align-items: center; padding: 10px 0; }
  .tab-badge { font-family: inherit; font-size: 13px; font-weight: 700; width: 32px; height: 32px; border-radius: 7px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s, transform 0.1s; opacity: 0.35; }
  .tab-badge:hover { opacity: 0.7; }
  .tab-badge.active { opacity: 1; transform: scale(1.08); }
  .tab-badge-m { background: #E6F1FB; color: #0C447C; }
  .tab-badge-w { background: #FAEEDA; color: #633806; }
  .tab-right { display: flex; align-items: center; gap: 8px; padding: 8px 0; }

  .year-bar { background: #f5f5f3; border-bottom: 1px solid #e5e5e0; padding: 8px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; }
  .year-info { display: flex; align-items: center; gap: 8px; }
  .year-info label { font-size: 13px; color: #555; font-weight: 500; }
  .year-input { font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 4px 8px; width: 76px; font-family: inherit; color: #1a1a18; background: #fff; }
  .year-input:focus { outline: none; border-color: #888; }

  .btn { font-family: inherit; font-size: 13px; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: opacity 0.15s; border: none; }
  .btn-primary { background: #1e2a4a; color: #fff; font-weight: 500; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { background: #fff; color: #1a1a18; border: 1px solid #ccc; }
  .btn-secondary:hover { background: #f5f5f3; }
  .btn-success { background: #fff; color: #27500A; border: 1px solid #97C459; font-weight: 500; }
  .btn-success:hover { background: #EAF3DE; }
  .btn-danger { background: #fff; color: #a32d2d; border: 1px solid #f09595; }
  .btn-danger:hover { background: #fcebeb; }
  .clear-btn { font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 6px; cursor: pointer; border: 1px solid #f09595; background: #fff; color: #a32d2d; font-family: inherit; }
  .clear-btn:hover { background: #fcebeb; }

  .toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 0 6px; flex-shrink: 0; flex-wrap: wrap; background: #f5f5f3; }

  input[type="text"], input[type="password"], input[type="date"], select {
    font-family: inherit; font-size: 13px; border: 1px solid #ddd; border-radius: 6px;
    padding: 6px 10px; background: #fff; color: #1a1a18; outline: none; transition: border 0.15s;
  }
  input:focus, select:focus { border-color: #888; }

  /* TABLE */
  .table-wrap { flex: 1; min-height: 0; overflow: auto; margin-bottom: 20px; background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; }
  table { border-collapse: collapse; font-size: 12px; white-space: nowrap; width: 100%; }
  thead th { text-align: center; padding: 7px 8px; font-size: 11px; font-weight: 500; color: #888; background: #fafaf8; border-bottom: 1px solid #e5e5e0; border-right: 1px solid #f0f0ec; position: sticky; top: 0; z-index: 10; }
  thead th.col-name { text-align: left; position: sticky; left: 0; top: 0; z-index: 25; background: #fafaf8; min-width: 200px; }
  thead th.col-period { cursor: pointer; user-select: none; min-width: 60px; }
  thead th.col-period:hover { background: #f0f0ec; }
  thead th.col-selected { background: #EAF3DE; border-bottom: 2px solid #97C459; }
  thead .period-header { font-weight: 600; color: #1e2a4a; font-size: 11px; }
  thead .period-sub { font-size: 10px; color: #aaa; font-weight: 400; }
  thead th.col-selected .period-header { color: #27500A; }
  thead th.col-selected .period-sub { color: #639922; }

  tbody tr { border-bottom: 1px solid #f0f0ec; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaf8; }
  tbody td { padding: 6px 4px; vertical-align: middle; border-right: 1px solid #f0f0ec; text-align: center; }
  tbody td.col-name { text-align: left; padding: 6px 12px; position: sticky; left: 0; background: #fff; z-index: 5; min-width: 200px; border-right: 2px solid #e5e5e0; }
  tbody tr:hover td.col-name { background: #fafaf8; }
  tbody td.col-selected { background: #f6fbf0; }
  .client-name { font-weight: 500; font-size: 13px; }
  .sub-text { font-size: 10px; color: #888; margin-top: 1px; }
  .badge { display: inline-block; font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }
  .badge-w { background: #FAEEDA; color: #633806; }
  .badge-m { background: #E6F1FB; color: #0C447C; }
  .empty-row td { text-align: center; color: #888; padding: 2.5rem; }

  /* PAYROLL CELLS */
  .pay-cell { width: 52px; height: 28px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; user-select: none; transition: opacity 0.12s; border: none; font-family: inherit; }
  .pay-cell:hover { opacity: 0.82; }
  .pay-filed  { background: #27ae60; color: #fff; }
  .pay-blank  { background: #e8e8e4; color: #bbb; }

  /* STATS */
  .container { max-width: 1800px; width: 100%; margin: 0 auto; padding: 0 24px; flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .stats-row { display: flex; gap: 10px; padding: 10px 0 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: center; }
  .stat-pill { background: #fff; border: 1px solid #e5e5e0; border-radius: 8px; padding: 7px 16px; font-size: 12px; color: #555; text-align: center; }
  .stat-pill strong { color: #1e2a4a; font-size: 15px; display: block; text-align: center; }
  .stat-pill.active-period { border-color: #97C459; background: #f6fbf0; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-start; justify-content: center; padding-top: 48px; overflow-y: auto; }
  .overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 1.5rem; width: 540px; max-width: 95vw; margin-bottom: 48px; }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 1.1rem; }
  .section-divider { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin: 1rem 0 0.6rem; padding-top: 0.75rem; border-top: 1px solid #e5e5e0; }
  .form-row { display: grid; gap: 10px; margin-bottom: 10px; }
  .form-row.two { grid-template-columns: 1fr 1fr; }
  .form-row.one { grid-template-columns: 1fr; }
  .form-row label { font-size: 12px; color: #666; display: block; margin-bottom: 3px; }
  .form-row input, .form-row select { width: 100%; }
  .pw-wrap { position: relative; display: flex; align-items: center; }
  .pw-wrap input { flex: 1; }
  .pw-toggle { position: absolute; right: 8px; font-size: 11px; cursor: pointer; color: #888; background: none; border: none; padding: 0; font-family: inherit; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.1rem; align-items: center; }
  .check-row { display: flex; gap: 20px; align-items: center; padding: 10px 0 4px; }
  .check-row label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #333; cursor: pointer; }
  .check-row input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #1e2a4a; }

  .confirm-box { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 1.5rem; width: 440px; max-width: 95vw; }
  .confirm-box h3 { font-size: 15px; font-weight: 500; margin-bottom: 0.6rem; }
  .confirm-box p { font-size: 13px; color: #555; margin-bottom: 1.2rem; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: #1e2a4a; color: #fff; font-size: 12px; padding: 8px 16px; border-radius: 6px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
  .toast.show { opacity: 1; }


  /* RECONCILIATION BANNER */
  .recon-banner { background: #fff; border-bottom: 2px solid #f0b429; padding: 0; flex-shrink: 0; display: none; }
  .recon-banner.visible { display: block; }
  .recon-banner-header { display: flex; align-items: center; gap: 12px; padding: 9px 24px; cursor: pointer; user-select: none; }
  .recon-banner-icon { font-size: 15px; }
  .recon-banner-title { font-size: 13px; font-weight: 600; color: #854F0B; flex: 1; }
  .recon-banner-summary { font-size: 12px; color: #888; }
  .recon-banner-toggle { font-size: 11px; color: #888; padding: 3px 8px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-family: inherit; }
  .recon-banner-dismiss { font-size: 11px; color: #aaa; padding: 3px 8px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-family: inherit; }
  .recon-banner-body { display: none; border-top: 1px solid #f0ece0; padding: 12px 24px 14px; background: #fffdf7; }
  .recon-banner-body.open { display: block; }
  .recon-section { margin-bottom: 12px; }
  .recon-section:last-child { margin-bottom: 0; }
  .recon-section-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .recon-items { display: flex; flex-wrap: wrap; gap: 6px; }
  .recon-item { display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid #e5e5e0; border-radius: 6px; padding: 5px 10px; font-size: 12px; }
  .recon-item.missing-crm { border-color: #f0b429; background: #FFFBF0; }
  .recon-item.missing-file { border-color: #f09595; background: #FFF5F5; }
  .recon-item-name { font-weight: 500; color: #1a1a18; }
  .recon-item-btn { font-size: 11px; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-family: inherit; border: none; }
  .recon-item-btn.add { background: #1e2a4a; color: #fff; }
  .recon-item-btn.add:hover { opacity: 0.85; }
  .recon-item-btn.archive { background: #fff; color: #a32d2d; border: 1px solid #f09595; }
  .recon-item-btn.archive:hover { background: #fcebeb; }
  .recon-scanning { font-size: 12px; color: #888; padding: 8px 24px; font-style: italic; }
  /* P30 / P60 CELLS */
  .p30-cell { width: 52px; height: 28px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; user-select: none; transition: opacity 0.12s; border: none; font-family: inherit; }
  .p30-cell:hover { opacity: 0.82; }
  .p30-na   { background: #e8e8e4; color: #777; }
  .p30-sent { background: #2980b9; color: #fff; }
  .p30-blank{ background: #e8e8e4; color: #bbb; }
  .corner-logo { position: fixed; bottom: 14px; left: 18px; z-index: 50; }
  .corner-logo img { height: 46px; display: block; mix-blend-mode: multiply; opacity: 0.88; filter: contrast(1.05); }

  .top-bar-nav { display: flex; align-items: center; gap: 2px; }
  .top-bar-nav a { font-size: 12px; font-weight: 500; color: #8fa3cc; text-decoration: none; padding: 5px 11px; border-radius: 4px; transition: all 0.15s; white-space: nowrap; }
  .top-bar-nav a:hover { background: #2d3d6b; color: #fff; }
  .top-bar-nav a.nav-active { background: #2d3d6b; color: #fff; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left">
    <div class="top-bar-title">Payroll</div>
    <nav class="top-bar-nav">
      <a href="index.html">Dashboard</a>
      <a href="aml.html">AML</a>
      <a href="tax.html">Tax</a>
      <a href="vat.html">VAT</a>
      <a href="payroll.html" class="nav-active">Payroll</a>
      <a href="cis.html">CIS</a>
      <a href="pension.html">Pension</a>
    </nav>
  </div>
  <div class="top-bar-right">
    <button class="topbar-btn" id="syncStatusBtn" onclick="manualSync()">&#8635; Not connected</button>
    <div class="top-bar-saved" id="lastSaved"></div>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-left">
    <button class="tab-badge tab-badge-m active" id="tab-monthly" onclick="switchTab('monthly')" title="Monthly">M</button>
    <button class="tab-badge tab-badge-w" id="tab-weekly" onclick="switchTab('weekly')" title="Weekly">W</button>
  </div>
  <div class="tab-right">
    <button class="btn btn-success" onclick="exportToExcel()" style="font-size:12px;padding:4px 12px;">&#8659; Export</button>
    <button class="btn btn-secondary" onclick="scanPayrollFiles()" style="font-size:12px;padding:4px 12px;" title="Compare Payroll folder against CRM">&#128194; Scan folder</button>
    <button class="clear-btn" onclick="confirmNewYear()">&#8635; New year</button>
    <button class="btn btn-primary" onclick="openModal(null)">+ Add employer</button>
  </div>
</div>

<div class="year-bar">
  <div class="year-info">
    <label>Tax year:</label>
    <input type="number" id="taxYearStart" class="year-input" value="2026" min="2020" max="2040" onchange="updateYear()">
    <span style="font-size:13px;color:#555;">/</span>
    <input type="number" id="taxYearEnd" class="year-input" value="2027" min="2021" max="2041" onchange="updateYear()">
  </div>
  <div class="year-info" id="w1-date-row" style="display:none;">
    <label>W1 week ending:</label>
    <input type="text" id="w1Date" class="year-input" style="width:88px;" placeholder="dd/mm" oninput="updateW1Date(this.value)">
    <span style="font-size:11px;color:#888;">e.g. 11/04 — W2–W53 auto-fill</span>
  </div>
</div>

<!-- Reconciliation banner -->
<div class="recon-banner" id="reconBanner">
  <div class="recon-banner-header" onclick="toggleReconBody()">
    <span class="recon-banner-icon">⚠</span>
    <span class="recon-banner-title">Payroll file reconciliation</span>
    <span class="recon-banner-summary" id="reconSummary"></span>
    <button class="recon-banner-toggle" id="reconToggleBtn" onclick="event.stopPropagation();toggleReconBody()">Review ▾</button>
    <button class="recon-banner-dismiss" onclick="event.stopPropagation();dismissRecon()">Dismiss</button>
  </div>
  <div class="recon-banner-body" id="reconBody"></div>
</div>

<div class="container">
  <div class="stats-row" id="statsRow"></div>
  <div class="toolbar">
    <input type="text" id="searchBox" placeholder="Search employer..." style="width:210px" oninput="render()">
  </div>
  <div class="table-wrap">
    <table id="payTable">
      <thead id="payHead"></thead>
      <tbody id="payBody"></tbody>
    </table>
  </div>
</div>

<!-- Client modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">Add employer</h3>
    <div class="form-row one">
      <div><label>Employer name</label><input id="f-name" type="text" placeholder="Smith Builders Ltd"></div>
    </div>
    <div class="form-row two">
      <div><label>PAYE reference number</label><input id="f-paye" type="text" placeholder="123/AB12345"></div>
      <div><label>Accounts Office reference</label><input id="f-aor" type="text" placeholder="123PA12345678"></div>
    </div>
    <div class="section-divider">HMRC credentials <span style="font-size:10px;font-weight:400;color:#aaa;text-transform:none;letter-spacing:0">(stored locally only)</span></div>
    <div class="form-row two">
      <div><label>HMRC user ID</label><input id="f-hmrc-user" type="text" autocomplete="off" placeholder="Government Gateway ID"></div>
      <div><label>HMRC password</label>
        <div class="pw-wrap">
          <input id="f-hmrc-pass" type="password" autocomplete="off" placeholder="••••••••">
          <button type="button" class="pw-toggle" onclick="togglePw()">Show</button>
        </div>
      </div>
    </div>
    <div class="section-divider">Payroll schedule</div>
    <div class="check-row">
      <label><input type="checkbox" id="f-monthly"> Monthly payroll</label>
      <label><input type="checkbox" id="f-weekly"> Weekly payroll</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="deleteBtn" onclick="deleteEmployer()" style="display:none;margin-right:auto">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEmployer()">Save</button>
    </div>
  </div>
</div>

<!-- New year confirm -->
<div class="overlay" id="clearOverlay">
  <div class="confirm-box">
    <h3>Start new tax year?</h3>
    <p id="clearMsg"></p>
    <div class="confirm-actions">
      <button class="btn btn-secondary" onclick="document.getElementById('clearOverlay').classList.remove('open')">Cancel</button>
      <button class="btn btn-danger" onclick="doNewYear()">Yes, start new year</button>
    </div>
  </div>

<script>
const AZURE_CLIENT_ID = 'b9d8863a-6f1c-4518-8024-8073d37f79e6';
const REDIRECT_URI    = 'https://crm.markitoff.co.uk/payroll.html';
const SCOPES          = ['Files.ReadWrite', 'User.Read'];
const DATA_FILE       = 'payroll_data.json';

const MONTHS = [
  {key:'M1', label:'M1', sub:'Apr'},
  {key:'M2', label:'M2', sub:'May'},
  {key:'M3', label:'M3', sub:'Jun'},
  {key:'M4', label:'M4', sub:'Jul'},
  {key:'M5', label:'M5', sub:'Aug'},
  {key:'M6', label:'M6', sub:'Sep'},
  {key:'M7', label:'M7', sub:'Oct'},
  {key:'M8', label:'M8', sub:'Nov'},
  {key:'M9', label:'M9', sub:'Dec'},
  {key:'M10',label:'M10',sub:'Jan'},
  {key:'M11',label:'M11',sub:'Feb'},
  {key:'M12',label:'M12',sub:'Mar'}
];

const WEEKS_BASE = Array.from({length:53}, function(_,i){ return 'W'+(i+1); });
var w1DateStr = '';

function getWeeks() {
  // Parse w1DateStr as dd/mmm (e.g. "11/Apr")
  var base = parseW1Date(w1DateStr);
  return WEEKS_BASE.map(function(key, i) {
    var sub;
    if (base) {
      var d = new Date(base.getTime() + i * 7 * 24 * 60 * 60 * 1000);
      sub = d.getDate().toString().padStart(2,'0') + '/' + d.toLocaleString('en-GB',{month:'short'});
    } else {
      sub = key; // fallback: just W1, W2...
    }
    return { key: key, label: key, sub: sub };
  });
}

function parseW1Date(str) {
  if (!str || str.length < 4) return null;
  var parts = str.split('/');
  if (parts.length !== 2) return null;
  var day = parseInt(parts[0]);
  var mon = parseInt(parts[1]) - 1; // 0-indexed
  if (isNaN(day) || isNaN(mon) || mon < 0 || mon > 11) return null;
  var yr = taxYearStart;
  if (mon <= 2) yr = taxYearStart + 1; // Jan-Mar fall in second half of tax year
  return new Date(yr, mon, day);
}

function updateW1Date(val) {
  w1DateStr = val;
  try { localStorage.setItem('mio-payroll-w1date', val); } catch(e) {}
  render();
}

let employers    = [];
let nextId       = 1;
let taxYearStart = 2026;
let editingId    = null;
let currentTab   = 'monthly';
let selectedPeriod = 'M1';
let msalInstance = null;
let accessToken  = null;
let saveQueued   = false;

// ── TAB ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  saveScrollPosition();
  currentTab = tab;
  selectedPeriod = localStorage.getItem('mio-payroll-period-'+tab) || (tab === 'monthly' ? 'M1' : 'W1');
  document.getElementById('tab-monthly').classList.toggle('active', tab === 'monthly');
  document.getElementById('tab-weekly').classList.toggle('active', tab === 'weekly');
  render();
  scrollToSelected();
}

// ── YEAR ───────────────────────────────────────────────────────────────────
function updateYear() {
  taxYearStart = parseInt(document.getElementById('taxYearStart').value) || 2026;
  document.getElementById('taxYearEnd').value = taxYearStart + 1;
  render(); triggerSave();
}

function confirmNewYear() {
  document.getElementById('clearMsg').innerHTML =
    'This will export current data to Excel then clear all submissions for <strong>'+
    taxYearStart+'/'+(taxYearStart+1)+'</strong>.';
  document.getElementById('clearOverlay').classList.add('open');
}

function doNewYear() {
  document.getElementById('clearOverlay').classList.remove('open');
  exportToExcel();
  taxYearStart++;
  document.getElementById('taxYearStart').value = taxYearStart;
  document.getElementById('taxYearEnd').value = taxYearStart + 1;
  employers.forEach(function(e){ e.monthly = {}; e.weekly = {}; e.p30 = {}; e.p60 = {}; });
  triggerSave(); render();
  showToast('Reset for '+taxYearStart+'/'+(taxYearStart+1));
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

function render() {
  var search = document.getElementById('searchBox').value.toLowerCase();
  var periods = currentTab === 'monthly' ? MONTHS : getWeeks();
  document.getElementById('w1-date-row').style.display = currentTab === 'weekly' ? 'flex' : 'none';
  var dataKey = currentTab === 'monthly' ? 'isMonthly' : 'isWeekly';
  var storeKey = currentTab === 'monthly' ? 'monthly' : 'weekly';

  var filtered = employers.filter(function(e){
    if (!e[dataKey]) return false;
    return !search || e.name.toLowerCase().includes(search) || (e.paye||'').toLowerCase().includes(search);
  }).sort(function(a,b){ return a.name.localeCompare(b.name); });

  // Header — each period column is clickable
  var headHtml = '<tr><th class="col-name">Employer</th>';
  periods.forEach(function(p){
    var isSel = p.key === selectedPeriod;
    headHtml += '<th class="col-period'+(isSel?' col-selected':'')+'" onclick="selectPeriod(\''+p.key+'\')">'
      +'<div class="period-header">'+p.label+'</div>'
      +'<div class="period-sub">'+p.sub+'</div>'
      +(isSel?'<div style="font-size:9px;color:#639922;margin-top:1px;">&#9660;</div>':'')
      +'</th>';
    if (currentTab === 'monthly') {
      headHtml += '<th class="col-period'+(isSel?' col-selected':'')+'" style="min-width:56px;"><div class="period-header">P30</div><div class="period-sub">'+p.sub+'</div></th>';
      if (p.key === 'M12') headHtml += '<th class="col-period'+(isSel?' col-selected':'')+'" style="min-width:56px;"><div class="period-header">P60</div><div class="period-sub">Mar</div></th>';
    }
  });
  headHtml += '</tr>';
  document.getElementById('payHead').innerHTML = headHtml;

  // Body
  if (!filtered.length) {
    var msg = currentTab === 'monthly'
      ? 'No monthly employers — add one and tick Monthly'
      : 'No weekly employers — add one and tick Weekly';
    document.getElementById('payBody').innerHTML = '<tr class="empty-row"><td colspan="'+(periods.length+1)+'">'+msg+'</td></tr>';
  } else {
    document.getElementById('payBody').innerHTML = filtered.map(function(e){
      var cells = periods.map(function(p){
        var isSel = p.key === selectedPeriod;
        var val = (e[storeKey] && e[storeKey][p.key]) || '';
        var cls = 'pay-cell ' + (val === 'FILED' ? 'pay-filed' : 'pay-blank');
        var label = val === 'FILED' ? 'Filed' : '—';
        var cell = '<td'+(isSel?' class="col-selected"':'')+'>'
          +'<button class="'+cls+'" data-id="'+e.id+'" data-key="'+p.key+'" data-store="'+storeKey
          +'" onclick="toggleCell(this.dataset.id,this.dataset.key,this.dataset.store)">'+label+'</button>'
          +'</td>';
        if (currentTab === 'monthly') {
          var p30val = (e.p30 && e.p30[p.key]) || '';
          var p30cls = p30val === 'SENT' ? 'p30-cell p30-sent' : (p30val === 'NA' ? 'p30-cell p30-na' : 'p30-cell p30-blank');
          var p30lbl = p30val === 'SENT' ? 'Sent' : (p30val === 'NA' ? 'N/A' : '—');
          cell += '<td'+(isSel?' class="col-selected"':'')+'>'+' <button class="'+p30cls+'" data-id="'+e.id+'" data-key="'+p.key+'" onclick="toggleP30(this.dataset.id,this.dataset.key)">'+p30lbl+'</button></td>';
          if (p.key === 'M12') {
            var p60val = (e.p60 && e.p60['M12']) || '';
            var p60cls = p60val === 'SENT' ? 'p30-cell p30-sent' : (p60val === 'NA' ? 'p30-cell p30-na' : 'p30-cell p30-blank');
            var p60lbl = p60val === 'SENT' ? 'Sent' : (p60val === 'NA' ? 'N/A' : '—');
            cell += '<td'+(isSel?' class="col-selected"':'')+'>'+' <button class="'+p60cls+'" data-id="'+e.id+'" onclick="toggleP60(this.dataset.id)">'+p60lbl+'</button></td>';
          }
        }
        return cell;
      }).join('');
      var badges = (e.isMonthly ? '<span class="badge badge-m">M</span>' : '')
                 + (e.isWeekly  ? '<span class="badge badge-w">W</span>' : '');
      return '<tr>'
        +'<td class="col-name" onclick="openModal('+e.id+')" style="cursor:pointer">'
        +'<div class="client-name">'+e.name+badges+'</div>'
        +'<div class="sub-text">'+(e.paye||'')+(e.paye&&e.aor?' · ':'')+(e.aor||'')+'</div>'
        +'</td>'+cells+'</tr>';
    }).join('');
  }

  // Stats — based on selected period
  var total = filtered.length;
  var filed = 0, outstanding = 0;
  filtered.forEach(function(e){
    var v = e[storeKey] && e[storeKey][selectedPeriod];
    if (v === 'FILED') filed++;
    else outstanding++;
  });
  var tabLabel = currentTab === 'monthly' ? 'Monthly' : 'Weekly';
  var selPeriod = periods.find(function(p){ return p.key === selectedPeriod; });
  var selLabel = selPeriod ? selPeriod.label + (selPeriod.sub ? ' ('+selPeriod.sub+')' : '') : selectedPeriod;
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-pill"><strong>'+total+'</strong>'+tabLabel+' employers</div>'
    +'<div class="stat-pill active-period" style="min-width:120px;">'
      +'<strong style="color:#27500A;">'+selLabel+'</strong>Selected period</div>'
    +'<div class="stat-pill" style="border-color:#97C459;">'
      +'<strong style="color:#27500A;">'+filed+'</strong>Filed</div>'
    +'<div class="stat-pill" style="border-color:#FAC775;">'
      +'<strong style="color:#633806;">'+outstanding+'</strong>Outstanding</div>';
}

// ── SELECT PERIOD ──────────────────────────────────────────────────────────
function selectPeriod(key) {
  selectedPeriod = key;
  try { localStorage.setItem('mio-payroll-period-'+currentTab, key); } catch(e){}
  render();
  scrollToSelected();
  setTimeout(saveScrollPosition, 300);
}

function scrollToSelected() {
  setTimeout(function() {
    var wrap = document.querySelector('.table-wrap');
    if (!wrap) return;
    var saved = parseInt(localStorage.getItem('mio-payroll-scroll-'+currentTab) || '0');
    wrap.scrollLeft = saved;
  }, 150);
}

function saveScrollPosition() {
  var wrap = document.querySelector('.table-wrap');
  if (wrap) {
    try { localStorage.setItem('mio-payroll-scroll-'+currentTab, wrap.scrollLeft); } catch(e) {}
  }
}

// ── TOGGLE ─────────────────────────────────────────────────────────────────
function toggleCell(id, key, storeKey) {
  var e = employers.find(function(x){ return x.id === parseInt(id); });
  if (!e) return;
  if (!e[storeKey]) e[storeKey] = {};
  e[storeKey][key] = e[storeKey][key] === 'FILED' ? '' : 'FILED';
  triggerSave(); render();
}

// ── P30 / P60 TOGGLES ──────────────────────────────────────────────────────
function toggleP30(id, key) {
  var e = employers.find(function(x){ return x.id === parseInt(id); });
  if (!e) return;
  if (!e.p30) e.p30 = {};
  var cur = e.p30[key] || '';
  // blank → N/A → Sent → blank
  e.p30[key] = cur === '' ? 'NA' : (cur === 'NA' ? 'SENT' : '');
  triggerSave(); render();
}

function toggleP60(id) {
  var e = employers.find(function(x){ return x.id === parseInt(id); });
  if (!e) return;
  if (!e.p60) e.p60 = {};
  var cur = e.p60['M12'] || '';
  // blank → N/A → Sent → blank
  e.p60['M12'] = cur === '' ? 'NA' : (cur === 'NA' ? 'SENT' : '');
  triggerSave(); render();
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id;
  document.getElementById('f-hmrc-pass').type = 'password';
  document.querySelector('.pw-toggle').textContent = 'Show';
  var deleteBtn = document.getElementById('deleteBtn');
  if (id === null) {
    document.getElementById('modalTitle').textContent = 'Add employer';
    ['f-name','f-paye','f-aor','f-hmrc-user','f-hmrc-pass'].forEach(function(i){ document.getElementById(i).value=''; });
    document.getElementById('f-monthly').checked = currentTab === 'monthly';
    document.getElementById('f-weekly').checked  = currentTab === 'weekly';
    deleteBtn.style.display = 'none';
  } else {
    var e = employers.find(function(x){ return x.id === id; });
    document.getElementById('modalTitle').textContent = e.name;
    document.getElementById('f-name').value = e.name||'';
    document.getElementById('f-paye').value = e.paye||'';
    document.getElementById('f-aor').value  = e.aor||'';
    document.getElementById('f-hmrc-user').value = e.hmrcUser||'';
    document.getElementById('f-hmrc-pass').value = e.hmrcPass||'';
    document.getElementById('f-monthly').checked = !!e.isMonthly;
    document.getElementById('f-weekly').checked  = !!e.isWeekly;
    deleteBtn.style.display = 'block';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function togglePw() {
  var inp = document.getElementById('f-hmrc-pass'), btn = document.querySelector('.pw-toggle');
  inp.type = inp.type==='password'?'text':'password'; btn.textContent = inp.type==='password'?'Show':'Hide';
}

function saveEmployer() {
  var name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Employer name is required'); return; }
  var isMonthly = document.getElementById('f-monthly').checked;
  var isWeekly  = document.getElementById('f-weekly').checked;
  if (!isMonthly && !isWeekly) { alert('Please tick at least one of Monthly or Weekly'); return; }
  var data = {
    name: name,
    paye: document.getElementById('f-paye').value.trim(),
    aor:  document.getElementById('f-aor').value.trim(),
    hmrcUser: document.getElementById('f-hmrc-user').value.trim(),
    hmrcPass: document.getElementById('f-hmrc-pass').value,
    isMonthly: isMonthly,
    isWeekly:  isWeekly
  };
  if (editingId === null) {
    employers.push(Object.assign({id: nextId++, monthly: {}, weekly: {}}, data));
  } else {
    var e = employers.find(function(x){ return x.id === editingId; });
    Object.assign(e, data);
  }
  closeModal(); triggerSave(); render(); showToast('Saved');
}

function deleteEmployer() {
  if (!confirm('Delete this employer? This cannot be undone.')) return;
  employers = employers.filter(function(x){ return x.id !== editingId; });
  closeModal(); triggerSave(); render(); showToast('Deleted');
}

// ── EXCEL EXPORT ───────────────────────────────────────────────────────────
function exportToExcel() {
  var wb = XLSX.utils.book_new();

  // Monthly sheet
  var mEmployers = employers.filter(function(e){ return e.isMonthly; })
    .sort(function(a,b){ return a.name.localeCompare(b.name); });
  if (mEmployers.length) {
    var mRows = mEmployers.map(function(e){
      var row = {'Employer': e.name, 'PAYE Ref': e.paye||'', 'AO Ref': e.aor||''};
      MONTHS.forEach(function(p){
        row[p.key+' ('+p.sub+')'] = (e.monthly&&e.monthly[p.key])==='FILED'?'Filed':'';
        var p30v = e.p30 && e.p30[p.key];
        row['P30 '+p.key] = p30v==='SENT'?'Sent':(p30v==='NA'?'N/A':'');
      });
      var p60v = e.p60 && e.p60['M12'];
      row['P60 M12'] = p60v==='SENT'?'Sent':(p60v==='NA'?'N/A':'');
      return row;
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(mRows), 'Monthly '+taxYearStart);
  }

  // Weekly sheet
  var wEmployers = employers.filter(function(e){ return e.isWeekly; })
    .sort(function(a,b){ return a.name.localeCompare(b.name); });
  if (wEmployers.length) {
    var wRows = wEmployers.map(function(e){
      var row = {'Employer': e.name, 'PAYE Ref': e.paye||'', 'AO Ref': e.aor||''};
      getWeeks().forEach(function(p){ row[p.key+(p.sub!==p.key?' ('+p.sub+')':'')] = (e.weekly&&e.weekly[p.key])==='FILED'?'Filed':''; });
      return row;
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wRows), 'Weekly '+taxYearStart);
  }

  XLSX.writeFile(wb, 'Payroll_'+taxYearStart+'_'+(taxYearStart+1)+'.xlsx');
  showToast('Exported to Excel');
}

// ── MSAL / ONEDRIVE ────────────────────────────────────────────────────────
function setSyncStatus(state, text) {
  var btn = document.getElementById('syncStatusBtn');
  btn.className = 'topbar-btn '+(state||'');
  btn.textContent = text;
}

function initMsal() {
  msalInstance = new msal.PublicClientApplication({
    auth: { clientId: AZURE_CLIENT_ID, authority: 'https://login.microsoftonline.com/common', redirectUri: REDIRECT_URI },
    cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true }
  });
}

async function getToken() {
  var accounts = msalInstance.getAllAccounts();
  if (!accounts.length) return null;
  try {
    var r = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return r.accessToken;
  } catch(e) { return null; }
}

async function signIn() {
  try { await msalInstance.loginRedirect({ scopes: SCOPES }); }
  catch(e) { setSyncStatus('error','⚠ Sign in failed'); }
}

async function manualSync() {
  accessToken = await getToken();
  if (!accessToken) await signIn();
  else await loadFromOneDrive();
}

async function ensureToken() {
  accessToken = await getToken();
  return !!accessToken;
}

async function saveToOneDrive() {
  if (!await ensureToken()) return;
  setSyncStatus('syncing','⟳ Saving…');
  try {
    var payload = JSON.stringify({ employers: employers, nextId: nextId, taxYearStart: taxYearStart, w1DateStr: w1DateStr });
    var r = await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/'+DATA_FILE+':/content', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer '+accessToken, 'Content-Type': 'application/json' },
      body: payload
    });
    if (!r.ok) throw new Error(r.status);
    document.getElementById('lastSaved').textContent = 'Synced '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    setSyncStatus('synced','✓ OneDrive synced');
  } catch(e) { setSyncStatus('error','⚠ Sync failed'); }
}

async function loadFromOneDrive() {
  if (!await ensureToken()) { setSyncStatus('','⟳ Click to connect OneDrive'); return; }
  setSyncStatus('syncing','⟳ Loading…');
  try {
    var r = await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/'+DATA_FILE+':/content', {
      headers: { 'Authorization': 'Bearer '+accessToken }
    });
    if (r.status===404) { setSyncStatus('synced','✓ OneDrive connected'); showToast('Connected — no data yet'); return; }
    if (!r.ok) throw new Error(r.status);
    var loaded = await r.json();
    if (loaded.employers) {
      employers = loaded.employers;
      nextId = loaded.nextId || (employers.length ? Math.max.apply(null,employers.map(function(e){return e.id;}))+1 : 1);
      if (loaded.taxYearStart) {
        taxYearStart = loaded.taxYearStart;
        document.getElementById('taxYearStart').value = taxYearStart;
        document.getElementById('taxYearEnd').value = taxYearStart + 1;
      }
      if (loaded.w1DateStr) {
        w1DateStr = loaded.w1DateStr;
        document.getElementById('w1Date').value = w1DateStr;
        try { localStorage.setItem('mio-payroll-w1date', w1DateStr); } catch(e) {}
      }
      saveToLocalStorage(); render(); scrollToSelected();
      showToast('Loaded — '+employers.length+' employers');
    }
    setSyncStatus('synced','✓ OneDrive synced');
    scrollToSelected();
  } catch(e) { setSyncStatus('error','⚠ Sync failed — click to retry'); }
}

function saveToLocalStorage() {
  try { localStorage.setItem('mio-payroll-v1', JSON.stringify({employers:employers,nextId:nextId,taxYearStart:taxYearStart,w1DateStr:w1DateStr})); } catch(e){}
}

function triggerSave() {
  saveToLocalStorage();
  document.getElementById('lastSaved').textContent = 'Saved '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if (saveQueued) return;
  saveQueued = true;
  setTimeout(async function(){ saveQueued=false; await saveToOneDrive(); }, 1500);
}


// ── PAYROLL FILE RECONCILIATION ────────────────────────────────────────────
const PAYROLL_FOLDER_PATH = '/drive/root:/Mark It Off/Payroll:/children';

async function scanPayrollFiles() {
  if (!accessToken) return;
  try {
    // List files in the Payroll folder
    // Use SharePoint personal site drive
    // Site: markitofflimited-my.sharepoint.com/personal/mark_markitoff_co_uk1
    var siteId = 'markitofflimited-my.sharepoint.com,/personal/mark_markitoff_co_uk1';
    var urls = [
      'https://graph.microsoft.com/v1.0/sites/markitofflimited-my.sharepoint.com:/personal/mark_markitoff_co_uk1:/drive/root:/Documents/Mark%20It%20Off/Payroll:/children?$select=name,file&$top=200',
      'https://graph.microsoft.com/v1.0/sites/markitofflimited-my.sharepoint.com:/personal/mark_markitoff_co_uk1:/drive/root:/Mark%20It%20Off/Payroll:/children?$select=name,file&$top=200',
      'https://graph.microsoft.com/v1.0/me/drive/root:/Documents/Mark%20It%20Off/Payroll:/children?$select=name,file&$top=200',
    ];
    var r = null;
    for (var ui = 0; ui < urls.length; ui++) {
      r = await fetch(urls[ui], { headers: { 'Authorization': 'Bearer ' + accessToken } });
      console.log('Payroll scan attempt ' + ui, '->', r.status, urls[ui]);
      if (r.ok) break;
    }
    if (!r || !r.ok) {
      console.warn('Payroll folder scan failed on all paths');
      return;
    }
    var data = await r.json();
    var files = (data.value || []).filter(function(f){ return f.file && f.name.toLowerCase().endsWith('.pay'); }); // .pay files only

    // Extract client names — strip year suffix like " 2025-26" or " 2026-27" etc
    var fileNames = files.map(function(f){
      return f.name.replace(/\s*\d{4}-\d{2,4}[^\s]*$/, '').trim();
    }).filter(function(n){ return n.length > 0; });

    // Get CRM employer names (monthly only — those are the payroll manager clients)
    var crmNames = employers.filter(function(e){ return e.isMonthly; }).map(function(e){ return e.name.trim(); });

    // Normalise for comparison
    function norm(s){ return s.toLowerCase().replace(/[^a-z0-9]/g, ''); }

    var normFile = fileNames.map(norm);
    var normCrm  = crmNames.map(norm);

    // In folder but not in CRM
    var missingFromCrm = fileNames.filter(function(fn, i){
      return normCrm.indexOf(normFile[i]) === -1;
    });

    // In CRM but not in folder
    var missingFromFolder = crmNames.filter(function(cn, i){
      return normFile.indexOf(normCrm[i]) === -1;
    });

    renderReconBanner(missingFromCrm, missingFromFolder);
  } catch(e) {
    console.warn('Reconciliation scan error:', e);
  }
}

function renderReconBanner(missingFromCrm, missingFromFolder) {
  var total = missingFromCrm.length + missingFromFolder.length;
  if (total === 0) return; // all good, no banner

  var banner = document.getElementById('reconBanner');
  banner.classList.add('visible');

  var parts = [];
  if (missingFromCrm.length) parts.push(missingFromCrm.length + ' file' + (missingFromCrm.length > 1 ? 's' : '') + ' not in CRM');
  if (missingFromFolder.length) parts.push(missingFromFolder.length + ' employer' + (missingFromFolder.length > 1 ? 's' : '') + ' with no file found');
  document.getElementById('reconSummary').textContent = parts.join('  ·  ');

  var html = '';
  if (missingFromCrm.length) {
    html += '<div class="recon-section">';
    html += '<div class="recon-section-title">📂 In Payroll folder but not in CRM</div>';
    html += '<div class="recon-items">';
    missingFromCrm.forEach(function(name) {
      html += '<div class="recon-item missing-crm">';
      html += '<span class="recon-item-name">' + name + '</span>';
      html += '<button class="recon-item-btn add" onclick="addFromRecon(' + JSON.stringify(name) + ')">+ Add to CRM</button>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  if (missingFromFolder.length) {
    html += '<div class="recon-section">';
    html += '<div class="recon-section-title">❓ In CRM but no Payroll file found</div>';
    html += '<div class="recon-items">';
    missingFromFolder.forEach(function(name) {
      html += '<div class="recon-item missing-file">';
      html += '<span class="recon-item-name">' + name + '</span>';
      html += '<button class="recon-item-btn archive" onclick="archiveFromRecon(' + JSON.stringify(name) + ')">Archive</button>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  document.getElementById('reconBody').innerHTML = html;
}

function toggleReconBody() {
  var body = document.getElementById('reconBody');
  var btn  = document.getElementById('reconToggleBtn');
  var open = body.classList.toggle('open');
  btn.textContent = open ? 'Close ▴' : 'Review ▾';
}

function dismissRecon() {
  document.getElementById('reconBanner').classList.remove('visible');
}

function addFromRecon(name) {
  // Pre-fill the add employer modal with this name
  openModal(null);
  document.getElementById('f-name').value = name;
  document.getElementById('f-monthly').checked = true;
  showToast('Pre-filled — review and save to add ' + name);
}

function archiveFromRecon(name) {
  if (!confirm('Archive "' + name + '"? This will delete them from the CRM. You can re-add later.')) return;
  employers = employers.filter(function(e){ return e.name.trim() !== name; });
  triggerSave(); render();
  // Re-run scan so banner updates
  document.getElementById('reconBanner').classList.remove('visible');
  document.getElementById('reconBody').classList.remove('open');
  scanPayrollFiles();
  showToast(name + ' archived');
}

async function loadData() {
  initMsal();
  try {
    var result = await msalInstance.handleRedirectPromise();
    if (result && result.accessToken) accessToken = result.accessToken;
  } catch(e){}

  var loaded = null;
  try { var d = localStorage.getItem('mio-payroll-v1'); if(d) loaded=JSON.parse(d); } catch(e){}
  if (loaded) {
    employers = loaded.employers||[];
    nextId = loaded.nextId||(employers.length ? Math.max.apply(null,employers.map(function(e){return e.id;}))+1 : 1);
    if (loaded.taxYearStart) {
      taxYearStart = loaded.taxYearStart;
      document.getElementById('taxYearStart').value = taxYearStart;
      document.getElementById('taxYearEnd').value = taxYearStart + 1;
    }
    if (loaded.w1DateStr) {
      w1DateStr = loaded.w1DateStr;
      document.getElementById('w1Date').value = w1DateStr;
    }
  }
  selectedPeriod = localStorage.getItem('mio-payroll-period-'+currentTab) || (currentTab === 'monthly' ? 'M1' : 'W1');
  render();
  scrollToSelected();
  if (!accessToken) accessToken = await getToken();
  if (accessToken) { setSyncStatus('syncing','⟳ Syncing…'); await loadFromOneDrive(); }
  else setSyncStatus('','⟳ Click to connect OneDrive');
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('clearOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

// Save scroll position as user scrolls
document.querySelector('.table-wrap').addEventListener('scroll', function() {
  try { localStorage.setItem('mio-payroll-scroll-'+currentTab, this.scrollLeft); } catch(e) {}
});

loadData();
