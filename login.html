<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark It Off – Login</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="favicon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .login-container {
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .login-header {
    margin-bottom: 32px;
  }

  .login-title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: #1e2a4a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .login-subtitle {
    font-size: 13px;
    color: #888;
    font-weight: 500;
  }

  .login-btn {
    width: 100%;
    padding: 14px 20px;
    background: #1e2a4a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }

  .login-btn:hover {
    background: #2d3d6b;
    box-shadow: 0 4px 12px rgba(30,42,74,0.2);
  }

  .login-btn:active {
    transform: translateY(1px);
  }

  .login-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .loading {
    display: none;
    text-align: center;
  }

  .spinner {
    border: 3px solid #f0f0ec;
    border-top: 3px solid #1e2a4a;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .error {
    background: #fee;
    color: #c33;
    padding: 12px;
    border-radius: 6px;
    font-size: 12px;
    margin-top: 16px;
    display: none;
    text-align: left;
  }

  .microsoft-icon {
    display: inline-block;
    width: 18px;
    height: 18px;
    margin-right: 8px;
    vertical-align: -3px;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="login-title">Mark It Off</div>
    <div class="login-subtitle">Dashboard</div>
  </div>

  <div id="loginForm">
    <button class="login-btn" id="signInBtn" onclick="signIn()">
      <svg class="microsoft-icon" viewBox="0 0 24 24" fill="currentColor">
        <rect x="2" y="2" width="8" height="8"/>
        <rect x="14" y="2" width="8" height="8"/>
        <rect x="2" y="14" width="8" height="8"/>
        <rect x="14" y="14" width="8" height="8"/>
      </svg>
      Sign in with Microsoft
    </button>
  </div>

  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <div style="font-size: 13px; color: #888;">Signing you in...</div>
  </div>

  <div class="error" id="errorMsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<script>
const msalConfig = {
  auth: {
    clientId: 'b9d8863a-6f1c-4518-8024-8073d37f79e6',
    authority: 'https://login.microsoftonline.com/common',
    redirectUri: window.location.origin + '/login.html'
  },
  cache: {
    cacheLocation: 'localStorage',
    storeAuthStateInCookie: true
  }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

async function initializeAndHandleRedirect() {
  try {
    console.log('[MSAL] Initializing with config:', {
      clientId: msalConfig.auth.clientId,
      redirectUri: msalConfig.auth.redirectUri
    });
    
    // Initialize MSAL first
    await msalInstance.initialize();
    console.log('[MSAL] Initialization complete');
    
    // CRITICAL: Handle redirect promise immediately
    console.log('[MSAL] Processing redirect promise...');
    const response = await msalInstance.handleRedirectPromise();
    
    if (response) {
      console.log('[MSAL] ✓ Redirect response received');
      console.log('[MSAL] User:', response.account.username);
      
      // We have a successful auth response
      storeAuthToken(response.accessToken);
      console.log('[MSAL] Token stored, redirecting to dashboard...');
      redirectToDashboard();
      return;
    }
    
    console.log('[MSAL] No redirect response - checking for existing session');
    const accounts = msalInstance.getAllAccounts();
    console.log('[MSAL] Accounts in cache:', accounts.length);
    
    if (accounts.length > 0) {
      console.log('[MSAL] Found existing account, attempting silent token acquisition...');
      try {
        const tokenResponse = await msalInstance.acquireTokenSilent({
          scopes: ['User.Read'],
          account: accounts[0]
        });
        console.log('[MSAL] ✓ Silent token acquired');
        storeAuthToken(tokenResponse.accessToken);
        redirectToDashboard();
        return;
      } catch (silentErr) {
        console.warn('[MSAL] Silent token failed:', silentErr.errorCode, silentErr.error);
        // Fall through to show login button
      }
    }
    
    console.log('[MSAL] Ready for new login');
    showSignInButton();
    
  } catch (err) {
    console.error('[MSAL] Initialization error:', err);
    showError('Initialization failed: ' + (err.message || 'Unknown error'));
    showSignInButton();
  }
}

function showSignInButton() {
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('signInBtn').disabled = false;
}

function showLoading() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}

function showError(message) {
  console.error('[UI] Error:', message);
  document.getElementById('errorMsg').textContent = message;
  document.getElementById('errorMsg').style.display = 'block';
}

function storeAuthToken(accessToken) {
  console.log('[Storage] Storing auth token with 24hr expiry');
  const expiryTime = new Date().getTime() + (24 * 60 * 60 * 1000);
  localStorage.setItem('authToken', accessToken || 'authenticated');
  localStorage.setItem('authExpiry', expiryTime);
  localStorage.setItem('authTimestamp', new Date().getTime());
}

function redirectToDashboard() {
  console.log('[Navigation] Redirecting to dashboard in 500ms');
  setTimeout(() => {
    window.location.href = 'index.html';
  }, 500);
}

async function signIn() {
  try {
    console.log('[SignIn] Sign-in button clicked');
    document.getElementById('signInBtn').disabled = true;
    showLoading();

    console.log('[SignIn] Initiating loginRedirect to Microsoft...');
    await msalInstance.loginRedirect({
      scopes: ['User.Read'],
      prompt: 'select_account'
    });
    // Note: loginRedirect redirects the page immediately
    console.log('[SignIn] Redirect initiated');
    
  } catch (err) {
    console.error('[SignIn] Error:', err);
    showError('Sign-in failed: ' + (err.message || 'Unknown error'));
    showSignInButton();
    document.getElementById('signInBtn').disabled = false;
  }
}

// Start immediately when script loads
console.log('[App] Page load detected, initializing MSAL...');
initializeAndHandleRedirect();
</script>

</body>
</html>
